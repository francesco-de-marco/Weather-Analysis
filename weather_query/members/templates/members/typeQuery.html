<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Data Query</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .container {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 1200px;
        }
        .form-container, .result-container {
            padding: 20px;
            box-sizing: border-box;
        }
        .form-container {
            flex: 1;
            border-right: 1px solid #e0e0e0;
        }
        .result-container {
            flex: 1;
            max-width: 50%;
        }
        h1 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }
        label {
            margin-bottom: 5px;
            font-size: 16px;
            font-weight: bold;
            color: #555555;
        }
        select, button {
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: #ffffff;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        .loading-message {
            color: #007bff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .error {
            color: #ff0000;
            font-weight: bold;
            text-align: center;
        }
        .result-section {
            margin-bottom: 20px;
        }
        .result-title {
            font-size: 20px;
            color: #007bff;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
        }
        .result-table th, .result-table td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        .result-table th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        .result-table td {
            background-color: #f0f0f0;
        }
        .result-table tr:nth-child(odd) td {
            background-color: #ffffff;
        }
        .difference {
            color: #104b2a;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
        }
        .back-to-home-button {
            background-color: #28a745;
            color: #ffffff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            display: block;
            margin-top: 10px;
            width: 100%;
        }

        .back-to-home-button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Form Container -->
        <div class="form-container">
            <h1>Weather Data Query</h1>
            <form id="weather-form">
                <label for="state_code">State Code:</label>
                <select id="state_code" name="state_code">
                    <option value="">Select State</option>
                    {% for state_code, state_name in states.items %}
                        <option value="{{ state_code }}">{{ state_name }}</option>
                    {% endfor %}
                </select>

                <label for="types">Type:</label>
                <select id="types" name="types">
                    {% for key, value in typesD.items %}
                        <option value="{{ key }}">{{ value }}</option>
                    {% endfor %}
                </select>

                <label for="month">Month:</label>
                <select id="month" name="month">
                    {% for month in months %}
                        <option value="{{ month }}">{{ month }}</option>
                    {% endfor %}
                </select>

                <label for="info">Info:</label>
                <select id="info" name="info">
                    {% for column in columns %}
                        <option value="{{ column.key }}">{{ column.description }}</option>
                    {% endfor %}
                </select>

                <button type="submit">Query</button>
                <!-- Back to Home Button -->
                <button type="button" class="back-to-home-button" onclick="window.location.href='/'">Back to Home</button>
            </form>

            <div id="loading" class="loading-message" style="display: none;">
                Loading...
            </div>
        </div>

        <!-- Result Container -->
        <div id="result" class="result-container">
            <h2>Query Results</h2>
            <!-- The result will be dynamically added here -->
        </div>
    </div>

    <script>
        document.getElementById("types").addEventListener("change", function() {
            const selectedType = this.value;

            // Show loader while loading data
            document.getElementById("loading").style.display = "block";

            // AJAX request to fetch new columns
            fetch(`/get-columns-des?types=${selectedType}`)
                .then(response => response.json())
                .then(data => {
                    // Hide loader
                    document.getElementById("loading").style.display = "none";

                    // Update "info" select options
                    const infoSelect = document.getElementById("info");
                    infoSelect.innerHTML = ''; // Clear existing options

                    data.columns_des.forEach(col => {
                        const option = document.createElement("option");
                        option.value = col.key;
                        option.textContent = col.description;
                        infoSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error("Error fetching columns:", error);
                    document.getElementById("loading").style.display = "none";
                });
        });

        document.getElementById("weather-form").addEventListener("submit", function(event) {
            event.preventDefault();

            const state_code = document.getElementById("state_code").value;
            const month = document.getElementById("month").value;
            const info = document.getElementById("info").value;
            const types = document.getElementById("types").value;

            const loadingMessage = document.getElementById("loading");
            const resultsDiv = document.getElementById("result");

            loadingMessage.style.display = "block";
            resultsDiv.innerHTML = "";

            fetch(`/type-query?state_code=${state_code}&month=${month}&info=${info}&types=${types}`)
                .then(response => response.json())
                .then(data => {
                    loadingMessage.style.display = "none";

                    if (data.error) {
                        resultsDiv.innerHTML = `<p class="error">${data.error}</p>`;
                        return;
                    }

                    // Format the result
                    const result = `
                        <div class="result-section">
                            <div class="result-title">Min Value</div>
                            <table class="result-table">
                                <tr><th>WBAN</th><td>${data.result.min.WBAN}</td></tr>
                                <tr><th>Location</th><td>${data.result.min.Location}</td></tr>
                                <tr><th>Latitude</th><td>${data.result.min.Latitude}</td></tr>
                                <tr><th>Longitude</th><td>${data.result.min.Longitude}</td></tr>
                                <tr><th>Value</th><td>${data.result.min.Value}</td></tr>
                            </table>
                        </div>

                        <div class="result-section">
                            <div class="result-title">Max Value</div>
                            <table class="result-table">
                                <tr><th>WBAN</th><td>${data.result.max.WBAN}</td></tr>
                                <tr><th>Location</th><td>${data.result.max.Location}</td></tr>
                                <tr><th>Latitude</th><td>${data.result.max.Latitude}</td></tr>
                                <tr><th>Longitude</th><td>${data.result.max.Longitude}</td></tr>
                                <tr><th>Value</th><td>${data.result.max.Value}</td></tr>
                            </table>
                        </div>

                        <div class="difference">
                            <strong>Difference between Max and Min:</strong> ${data.result.difference}
                        </div>
                    `;
                    resultsDiv.innerHTML = result;
                })
                .catch(error => {
                    loadingMessage.style.display = "none";
                    resultsDiv.innerHTML = `<p class="error">An error occurred while fetching the data. Please try again later.</p>`;
                });
        });
    </script>
</body>
</html>
