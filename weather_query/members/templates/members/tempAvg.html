<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Avg</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background: #fff;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            color: #333;
        }
        form {
            margin-bottom: 20px;
        }
        select, button {
            padding: 8px;
            font-size: 16px;
        }
        button {
            margin-left: 10px;
            cursor: pointer;
        }
        .result {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .back-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .back-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Average Temperature</h1>
        <form id="monthForm">
            <label for="month">Month:</label>
            <select id="month" name="month">
                {% for month in months %}
                    <option value="{{ forloop.counter }}">{{ month }}</option>
                {% endfor %}
            </select>
            <button type="button" onclick="fetchResults()">Find</button>
        </form>

        <h2>Results</h2>
        <div id="results"></div>

        <button class="back-button" onclick="window.location.href='/'">Back to Main Menu</button>
    </div>

    <script>
        function fetchResults() {
            const month = document.getElementById("month").value;

            // Perform fetch request
            fetch(`/calculate-temperature?month=${month}`)
                .then(response => response.json())
                .then(data => {
                    const resultsDiv = document.getElementById("results");
                    resultsDiv.innerHTML = ""; // Clear previous results

                    if (data.error) {
                        resultsDiv.innerHTML = `<p class="error">${data.error}</p>`;
                        return;
                    }

                    // Display results as a simple integer
                    if (data.results !== undefined) {
                        resultsDiv.innerHTML += `
                            <div class="result">
                                <p><strong>Average Temperature:</strong> ${data.results}°C</p>
                            </div>
                        `;
                    } else {
                        resultsDiv.innerHTML = `<p>No data available for the selected month.</p>`;
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    document.getElementById("results").innerHTML = `
                        <p class="error">An error occurred while fetching the data. Please try again later.</p>
                    `;
                });
        }
    </script>
</body>
</html>
