<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Station</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background: #fff;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            color: #333;
        }
        form {
            margin-bottom: 20px;
        }
        select, button {
            padding: 8px;
            font-size: 16px;
        }
        button {
            margin-left: 10px;
            cursor: pointer;
        }
        .result {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .back-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .back-button:hover {
            background-color: #0056b3;
        }
        .loading {
            color: #007BFF;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Query Station</h1>
        <form id="queryForm">
            <!-- State Selection -->
            <label for="state_code">State:</label>
            <select id="state_code" name="state_code">
                {% for state_code, state_name in states.items %}
                    <option value="{{ state_code }}">{{ state_name }}</option>
                {% endfor %}
            </select>
            <br><br>

            <!-- Month Start Selection -->
            <label for="month_start">Month Start:</label>
            <select id="month_start" name="month_start">
                {% for month in months %}
                    <option value="{{ month }}">{{ month }}</option>
                {% endfor %}
            </select>
            <br><br>

            <!-- Month End Selection -->
            <label for="month_end">Month End:</label>
            <select id="month_end" name="month_end">
                {% for month in months %}
                    <option value="{{ month }}">{{ month }}</option>
                {% endfor %}
            </select>
            <br><br>

            <!-- Info Selection -->
            <label for="info">Info:</label>
            <select id="info" name="info">
                {% for column in columns %}
                    <option value="{{ column.key }}">{{ column.description }}</option>
                {% endfor %}
            </select>            
            <br><br>

            <button type="button" onclick="fetchResults()">Find</button>
        </form>

        <h2>Results</h2>
        <div id="result"></div>
        <div id="loadingMessage" class="loading" style="display:none;">Loading...</div>

        <button class="back-button" onclick="window.location.href='/'">Back to Main Menu</button>
    </div>

    <script>
        function fetchResults() {
            const stateCode = document.getElementById("state_code").value;
            const monthStart = document.getElementById("month_start").value;
            const monthEnd = document.getElementById("month_end").value;
            const info = document.getElementById("info").value;
            
            // Show loading message
            document.getElementById("loadingMessage").style.display = "block";
            document.getElementById("result").innerHTML = ""; // Clear previous results
    
            // Fetch data using dynamic parameters
            fetch(`/station?state_code=${stateCode}&month_start=${monthStart}&month_end=${monthEnd}&info=${info}`)
                .then(response => response.json())
                .then(data => {
                    const resultsDiv = document.getElementById("result");
                    resultsDiv.innerHTML = ""; // Clear previous results

                    // Hide loading message
                    document.getElementById("loadingMessage").style.display = "none";
    
                    if (data.error) {
                        resultsDiv.innerHTML = `<p class="error">${data.error}</p>`;
                        return;
                    }
    
                    // Display results with the unit of measure
                    if (data.result !== undefined) {
                        resultsDiv.innerHTML += `
                            <div class="result">
                                <p><strong>Result:</strong> ${data.result} ${data.unit}</p>
                            </div>
                        `;
                    } else {
                        resultsDiv.innerHTML = `<p>No data available for the selected month.</p>`;
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    document.getElementById("result").innerHTML = `
                        <p class="error">An error occurred while fetching the data. Please try again later.</p>
                    `;
                    // Hide loading message in case of error
                    document.getElementById("loadingMessage").style.display = "none";
                });
        }
    </script>
</body>
</html>
